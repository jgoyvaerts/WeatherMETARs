name: Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/weathermetars/app' }}
      DEPLOY_DATA_DIR: ${{ secrets.DEPLOY_DATA_DIR || '/mnt/weathermetars' }}
      DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE || '/etc/weathermetars/weathermetars.env' }}
      DEPLOY_SERVICE_PREFIX: ${{ secrets.DEPLOY_SERVICE_PREFIX || 'weathermetars' }}
      VITE_COMMIT_HASH: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun audit

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Check formatting
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?Set DEPLOY_HOST in the production environment secrets}"
          : "${DEPLOY_USER:?Set DEPLOY_USER in the production environment secrets}"
          : "${DEPLOY_SSH_KEY:?Set DEPLOY_SSH_KEY in the production environment secrets}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Upload release
        shell: bash
        run: |
          set -euo pipefail
          ssh_target="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh_args=(-i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)
          remote_path="$(printf '%q' "$DEPLOY_PATH")"

          ssh "${ssh_args[@]}" "$ssh_target" "mkdir -p $remote_path"
          rsync -az --delete \
            --exclude-from deploy/rsync-exclude \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ "${ssh_target}:${DEPLOY_PATH}/"

      - name: Activate release
        shell: bash
        run: |
          set -euo pipefail
          ssh_target="${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh_args=(-i ~/.ssh/deploy_key -p "$DEPLOY_PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)
          remote_cmd="$(printf 'cd %q && APP_DIR=%q APP_DATA_DIR=%q APP_ENV_FILE=%q SERVICE_PREFIX=%q VITE_COMMIT_HASH=%q ./deploy/remote-deploy.sh' \
            "$DEPLOY_PATH" \
            "$DEPLOY_PATH" \
            "$DEPLOY_DATA_DIR" \
            "$DEPLOY_ENV_FILE" \
            "$DEPLOY_SERVICE_PREFIX" \
            "$VITE_COMMIT_HASH")"

          ssh "${ssh_args[@]}" "$ssh_target" "$remote_cmd"
